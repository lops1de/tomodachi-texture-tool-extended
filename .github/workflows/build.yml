# Builds PyInstaller artifacts. Publishes a GitHub Release on tag push (v*),
# or when manually dispatched with "Create release" enabled.
#
# Opt into Node.js 24 for Actions (addresses Node 20 deprecation warnings on the runner).
name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create / update GitHub Release with artifacts (uses Release tag below)"
        type: boolean
        default: false
      release_tag:
        description: "Existing git tag for the release (e.g. v1.0.0)"
        type: string
        required: true
        default: "v1.0.0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: TomodachiTextureTool-Windows.exe
            dist_name: TomodachiTextureTool.exe
          - os: macos-latest
            artifact: TomodachiTextureTool-macOS
            dist_name: TomodachiTextureTool
          - os: ubuntu-latest
            artifact: TomodachiTextureTool-Linux
            dist_name: TomodachiTextureTool

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller TomodachiTextureTool.spec

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/${{ matrix.dist_name }} dist/${{ matrix.artifact }}
        shell: bash

      - name: Rename artifact (macOS / Linux)
        if: runner.os != 'Windows'
        run: mv dist/${{ matrix.dist_name }} dist/${{ matrix.artifact }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      success() && (
        startsWith(github.ref, 'refs/tags/') ||
        (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
      )
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
          name: Tomodachi Texture Tool ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Windows  | `TomodachiTextureTool-Windows.exe` |
            | macOS    | `TomodachiTextureTool-macOS` |
            | Linux    | `TomodachiTextureTool-Linux` |

            > **macOS / Linux:** `chmod +x TomodachiTextureTool-*` before running.
            > **macOS:** Right-click → Open the first time if Gatekeeper blocks it.
          files: |
            dist/TomodachiTextureTool-Windows.exe
            dist/TomodachiTextureTool-macOS
            dist/TomodachiTextureTool-Linux
          draft: false
          prerelease: false
